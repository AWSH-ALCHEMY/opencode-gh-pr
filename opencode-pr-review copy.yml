# OpenCode PR Review Action
# A comprehensive AI-powered pull request review workflow
# Author: Generated by Super Z

name: OpenCode PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]

# Prevent concurrent reviews on the same PR
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

env:
  # Configure these in your repository secrets
  OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ============================================
  # Job 1: Initial PR Analysis
  # ============================================
  analyze-pr:
    name: Analyze PR Changes
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      files_changed: ${{ steps.changes.outputs.files_changed }}
      lines_added: ${{ steps.changes.outputs.additions }}
      lines_removed: ${{ steps.changes.outputs.deletions }}
      has_security_sensitive_files: ${{ steps.classify.outputs.security_sensitive }}
      change_complexity: ${{ steps.classify.outputs.complexity }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Changes
        id: changes
        run: |
          # Get list of changed files
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | jq -R -s -c 'split("\n")[:-1]')
          echo "files_changed=$FILES" >> $GITHUB_OUTPUT

          # Get line counts
          ADDITIONS=$(gh pr view ${{ github.event.pull_request.number }} --json additions --jq '.additions')
          DELETIONS=$(gh pr view ${{ github.event.pull_request.number }} --json deletions --jq '.deletions')

          echo "additions=$ADDITIONS" >> $GITHUB_OUTPUT
          echo "deletions=$DELETIONS" >> $GITHUB_OUTPUT

          echo "📊 PR Statistics:"
          echo "  - Files changed: $(echo $FILES | jq 'length')"
          echo "  - Lines added: $ADDITIONS"
          echo "  - Lines removed: $DELETIONS"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Classify Changes
        id: classify
        run: |
          FILES='${{ steps.changes.outputs.files_changed }}'

          # Check for security-sensitive files
          SECURITY_PATTERNS='("auth"|"security"|"password"|"secret"|"key"|"credential"|"config"|"env")'
          SECURITY_SENSITIVE=$(echo "$FILES" | jq --argjson patterns "$SECURITY_PATTERNS" \
            'any(.[]; test($patterns; "i"))' 2>/dev/null || echo "false")

          # Determine complexity based on change size
          ADDITIONS=${{ steps.changes.outputs.additions }}
          DELETIONS=${{ steps.changes.outputs.deletions }}
          TOTAL=$((ADDITIONS + DELETIONS))

          if [ $TOTAL -lt 100 ]; then
            COMPLEXITY="low"
          elif [ $TOTAL -lt 500 ]; then
            COMPLEXITY="medium"
          else
            COMPLEXITY="high"
          fi

          echo "security_sensitive=$SECURITY_SENSITIVE" >> $GITHUB_OUTPUT
          echo "complexity=$COMPLEXITY" >> $GITHUB_OUTPUT

  # ============================================
  # Job 2: Code Quality Review
  # ============================================
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: analyze-pr
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCode CLI
        run: |
          npm install -g @opencode-ai/cli || echo "OpenCode CLI not found, using fallback"
        continue-on-error: true

      - name: Get PR Diff
        id: diff
        run: |
          # Get full diff for AI analysis
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr_diff.patch

          # Get PR metadata
          PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title --jq '.title')
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq '.body')
          PR_AUTHOR=$(gh pr view ${{ github.event.pull_request.number }} --json author --jq '.author.login')

          echo "pr_title<<EOF" >> $GITHUB_OUTPUT
          echo "$PR_TITLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "pr_author=$PR_AUTHOR" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI Code Review Analysis
        id: review
        run: |
          # Create review prompt
          cat > /tmp/review_prompt.txt << 'PROMPT_EOF'
          You are an expert code reviewer. Analyze the following pull request diff and provide:

          1. **Summary**: Brief overview of what this PR does
          2. **Code Quality Issues**: Problems with code structure, readability, maintainability
          3. **Potential Bugs**: Logic errors, edge cases, potential runtime issues
          4. **Security Concerns**: Any security vulnerabilities or risks
          5. **Performance Issues**: Potential performance bottlenecks
          6. **Best Practices**: Deviations from best practices
          7. **Suggestions**: Specific line-by-line improvement suggestions

          Format your response as JSON with this structure:
          {
            "summary": "...",
            "issues": [
              {
                "file": "path/to/file",
                "line": 123,
                "severity": "error|warning|info",
                "category": "bug|security|performance|style|best-practice",
                "message": "...",
                "suggestion": "..."
              }
            ],
            "overall_score": 1-10,
            "approved": true|false,
            "review_comments": ["...", "..."]
          }

          PR Title: ${{ steps.diff.outputs.pr_title }}
          PR Author: @${{ steps.diff.outputs.pr_author }}
          Security Sensitive: ${{ needs.analyze-pr.outputs.has_security_sensitive_files }}
          Complexity: ${{ needs.analyze-pr.outputs.change_complexity }}

          Diff:
          PROMPT_EOF

          cat /tmp/pr_diff.patch >> /tmp/review_prompt.txt

          # Run AI review (using OpenCode or fallback to API)
          if command -v opencode &> /dev/null; then
            opencode review --input /tmp/review_prompt.txt --output /tmp/review_result.json
          else
            # Fallback: Use curl to call AI API
            curl -s -X POST "https://api.opencode.ai/v1/chat/completions" \
              -H "Authorization: Bearer $OPENCODE_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "model": "opencode-reviewer",
                "messages": [
                  {"role": "system", "content": "You are an expert code reviewer. Respond only with valid JSON."},
                  {"role": "user", "content": "'"$(cat /tmp/review_prompt.txt | jq -Rs .)"'"}
                ],
                "temperature": 0.3
              }' | jq '.choices[0].message.content' > /tmp/review_result.json
          fi

          echo "review_file=/tmp/review_result.json" >> $GITHUB_OUTPUT
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

      - name: Post Review Comments
        run: |
          # Parse review results and post comments
          node -e '
          const fs = require("fs");
          const review = JSON.parse(fs.readFileSync("/tmp/review_result.json", "utf8"));

          // Post summary comment
          const summaryComment = `
          ## 🤖 OpenCode AI Review

          ### 📋 Summary
          ${review.summary}

          ### 📊 Overall Score: ${review.overall_score}/10
          ${review.approved ? "✅ **Recommended for approval**" : "⚠️ **Changes requested**"}

          ### 💬 Review Notes
          ${review.review_comments.map(c => "- " + c).join("\n")}
          `;

          // Write comment to file for gh CLI
          fs.writeFileSync("/tmp/summary_comment.md", summaryComment);
          '

          # Post summary comment on PR
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/summary_comment.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Review Check
        run: |
          # Create check run with review results
          REVIEW=$(cat /tmp/review_result.json)
          SCORE=$(echo "$REVIEW" | jq -r '.overall_score')
          APPROVED=$(echo "$REVIEW" | jq -r '.approved')

          if [ "$APPROVED" = "true" ]; then
            CONCLUSION="success"
            TITLE="✅ AI Review Passed (Score: $SCORE/10)"
          else
            CONCLUSION="failure"
            TITLE="❌ AI Review Failed (Score: $SCORE/10)"
          fi

          # Create check using GitHub API
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/check-runs" \
            -d '{
              "name": "OpenCode AI Review",
              "head_sha": "${{ github.event.pull_request.head.sha }}",
              "status": "completed",
              "conclusion": "'"$CONCLUSION"'",
              "output": {
                "title": "'"$TITLE"'",
                "summary": "Automated AI-powered code review completed."
              }
            }'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Job 3: Security Scan
  # ============================================
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: analyze-pr
    if: |
      github.event.pull_request.draft == false &&
      (needs.analyze-pr.outputs.has_security_sensitive_files == 'true' ||
       needs.analyze-pr.outputs.change_complexity == 'high')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Security Linters
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          languages: javascript, typescript, python

      - name: Run Secret Detection
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: AI Security Review
        run: |
          echo "🔐 Running AI-powered security analysis..."

          # Get security-sensitive files
          FILES='${{ needs.analyze-pr.outputs.files_changed }}'
          SECURITY_FILES=$(echo "$FILES" | jq -r '.[] | select(test("(auth|security|password|secret|key|credential|config|env)"; "i"))')

          if [ -n "$SECURITY_FILES" ]; then
            echo "Security-sensitive files detected:"
            echo "$SECURITY_FILES"

            # Additional AI security analysis would go here
            # This could include checking for:
            # - Hardcoded secrets
            # - SQL injection vulnerabilities
            # - XSS vulnerabilities
            # - Authentication/authorization issues
            # - Insecure configurations
          fi

      - name: Post Security Findings
        if: failure()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## ⚠️ Security Scan Results

          Some security concerns were identified in this PR. Please review the security scan results above.

          **Recommendation**: Do not merge until security issues are addressed."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Job 4: Performance Analysis
  # ============================================
  performance-check:
    name: Performance Analysis
    runs-on: ubuntu-latest
    needs: analyze-pr
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Analyze Bundle Size Impact
        run: |
          echo "📦 Analyzing potential bundle size impact..."

          # Check for new dependencies
          if git diff --name-only origin/${{ github.base_ref }} | grep -q "package.json\|package-lock.json\|yarn.lock\|pnpm-lock.yaml"; then
            echo "Dependency changes detected"

            # List new dependencies
            NEW_DEPS=$(git diff origin/${{ github.base_ref }} -- package.json 2>/dev/null | grep "^\+" | grep -v "^\+\+" || true)

            if [ -n "$NEW_DEPS" ]; then
              echo "New dependencies added:"
              echo "$NEW_DEPS"

              # Post comment about dependencies
              gh pr comment ${{ github.event.pull_request.number }} --body "## 📦 Dependency Changes Detected

              This PR includes changes to dependencies. Please ensure:

              - [ ] Dependencies are from trusted sources
              - [ ] Bundle size impact is acceptable
              - [ ] No known vulnerabilities in new packages
              - [ ] License compatibility verified"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Performance Anti-patterns
        run: |
          echo "⚡ Checking for performance anti-patterns..."

          # Common anti-patterns to check
          PATTERNS=(
            "console\\.log"
            "debugger"
            "document\\.write"
            "eval\\("
            "innerHTML\\s*="
            "setTimeout\\([^,]+,\\s*0\\)"
          )

          FOUND_ISSUES=""

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git diff origin/${{ github.base_ref }} -U0 | grep -E "^\+.*$pattern" || true)
            if [ -n "$MATCHES" ]; then
              FOUND_ISSUES="${FOUND_ISSUES}Found: $pattern\n$MATCHES\n\n"
            fi
          done

          if [ -n "$FOUND_ISSUES" ]; then
            echo "⚠️ Potential performance issues found:"
            echo -e "$FOUND_ISSUES"
          fi

  # ============================================
  # Job 5: Documentation Check
  # ============================================
  docs-check:
    name: Documentation Review
    runs-on: ubuntu-latest
    needs: analyze-pr
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Documentation Updates
        run: |
          echo "📚 Checking documentation..."

          FILES='${{ needs.analyze-pr.outputs.files_changed }}'

          # Check if code changes have corresponding doc updates
          HAS_CODE_CHANGES=$(echo "$FILES" | jq -r 'any(.[]; test("\\.(js|ts|jsx|tsx|py|go|rs|java)$"))')
          HAS_DOC_CHANGES=$(echo "$FILES" | jq -r 'any(.[]; test("(README|CHANGELOG|docs/|\\.md$)"))')

          if [ "$HAS_CODE_CHANGES" = "true" ] && [ "$HAS_DOC_CHANGES" = "false" ]; then
            echo "ℹ️ Code changes detected without documentation updates"

            # Check if this is a significant change
            LINES_CHANGED=$((${{ needs.analyze-pr.outputs.lines_added }} + ${{ needs.analyze-pr.outputs.lines_removed }}))

            if [ $LINES_CHANGED -gt 100 ]; then
              gh pr comment ${{ github.event.pull_request.number }} --body "## 📚 Documentation Reminder

              This PR includes significant code changes but no documentation updates.

              Consider updating:
              - README.md if behavior changed
              - API documentation if endpoints changed
              - Inline code comments for complex logic
              - CHANGELOG.md for user-facing changes"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Job 6: Auto-assign Reviewers
  # ============================================
  assign-reviewers:
    name: Auto-assign Reviewers
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assign Reviewers Based on Files
        run: |
          echo "👥 Assigning reviewers..."

          # Define file patterns and reviewers (customize for your repo)
          # This could be read from a config file in the repo
          declare -A REVIEWER_MAP
          REVIEWER_MAP["frontend/"]="frontend-team"
          REVIEWER_MAP["backend/"]="backend-team"
          REVIEWER_MAP["api/"]="api-team"
          REVIEWER_MAP["security/"]="security-team"
          REVIEWER_MAP["infrastructure/"]="devops-team"

          FILES='${{ needs.analyze-pr.outputs.files_changed }}'
          REVIEWERS="[]"

          for pattern in "${!REVIEWER_MAP[@]}"; do
            if echo "$FILES" | jq -e "any(.[]; test(\"$pattern\"))" > /dev/null 2>&1; then
              REVIEWERS=$(echo "$REVIEWERS" | jq --arg team "${REVIEWER_MAP[$pattern]}" '. + [$team]')
            fi
          done

          if [ "$REVIEWERS" != "[]" ]; then
            echo "Suggested reviewers: $REVIEWERS"
            # Uncomment to auto-assign:
            # gh pr edit ${{ github.event.pull_request.number }} --add-reviewer "$(echo $REVIEWERS | jq -r '.[]' | tr '\n' ',')"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Job 7: Final Summary
  # ============================================
  final-summary:
    name: Review Summary
    runs-on: ubuntu-latest
    needs: [analyze-pr, code-review, security-scan, performance-check, docs-check]
    if: always() && github.event.pull_request.draft == false

    steps:
      - name: Create Final Summary
        run: |
          # Determine overall status
          REVIEW_STATUS="${{ needs.code-review.result }}"
          SECURITY_STATUS="${{ needs.security-scan.result }}"
          PERF_STATUS="${{ needs.performance-check.result }}"
          DOCS_STATUS="${{ needs.docs-check.result }}"

          SUMMARY="## 🤖 OpenCode PR Review Summary

          | Check | Status |
          |-------|--------|
          | 🧠 AI Code Review | $REVIEW_STATUS |
          | 🔐 Security Scan | $SECURITY_STATUS |
          | ⚡ Performance | $PERF_STATUS |
          | 📚 Documentation | $DOCS_STATUS |

          ### 📊 Change Statistics
          - **Files Changed**: $(echo '${{ needs.analyze-pr.outputs.files_changed }}' | jq 'length')
          - **Lines Added**: ${{ needs.analyze-pr.outputs.lines_added }}
          - **Lines Removed**: ${{ needs.analyze-pr.outputs.lines_removed }}
          - **Complexity**: ${{ needs.analyze-pr.outputs.change_complexity }}

          ---
          *This review was automatically generated by OpenCode AI. Please review all suggestions carefully before merging.*"

          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

          # Post summary comment
          gh pr comment ${{ github.event.pull_request.number }} --body "$SUMMARY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set PR Labels
        run: |
          # Add appropriate labels based on analysis
          LABELS=""

          COMPLEXITY="${{ needs.analyze-pr.outputs.change_complexity }}"
          case $COMPLEXITY in
            "low") LABELS="$LABELS,size/small" ;;
            "medium") LABELS="$LABELS,size/medium" ;;
            "high") LABELS="$LABELS,size/large" ;;
          esac

          if [ "${{ needs.analyze-pr.outputs.has_security_sensitive_files }}" = "true" ]; then
            LABELS="$LABELS,security-review"
          fi

          if [ "${{ needs.code-review.result }}" = "failure" ]; then
            LABELS="$LABELS,needs-changes"
          fi

          # Add labels
          if [ -n "$LABELS" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "${LABELS#,}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}