name: 'Secure PR Review Action'
description: 'Professional AI-powered pull request review with enterprise-grade security'
author: 'Security-First DevOps'

inputs:
  # Core Configuration
  github-token:
    description: 'GitHub token for API access'
    required: true
  
  ai-model:
    description: 'AI model to use for review'
    required: false
    default: 'opencode-reviewer'

  # Review Configuration
  approved-threshold:
    description: 'The minimum score to approve a PR'
    required: false
    default: '7'

  max-diff-size:
    description: 'The maximum diff size to review'
    required: false
    default: '1048576'

  max-files:
    description: 'The maximum number of files to review'
    required: false
    default: '100'

  max-lines:
    description: 'The maximum number of lines to review'
    required: false
    default: '5000'

  # Feature Flags
  security-analysis:
    description: 'Enable security analysis'
    required: false
    default: 'true'

  performance-check:
    description: 'Enable performance checks'
    required: false
    default: 'true'

  documentation-check:
    description: 'Enable documentation checks'
    required: false
    default: 'true'

  # Advanced Options
  config-file:
    description: 'Path to a custom configuration file, resolved relative to the checked-out repository'
    required: false
    default: '.github/pr-review-config.yml'

  prompt-registry-path:
    description: 'Path to a custom prompt registry, resolved relative to the checked-out repository'
    required: false
    default: 'prompts/registry.json'

  # Output Control
  create-checks:
    description: 'Create a check run for the review'
    required: false
    default: 'true'

  post-comments:
    description: 'Post comments on the PR'
    required: false
    default: 'true'

  apply-labels:
    description: 'Apply labels to the PR'
    required: false
    default: 'true'

runs:
  using: 'node24'
  main: 'dist/index.js'
  pre: 'dist/setup/index.js'
  post: 'dist/cleanup/index.js'

outputs:
  review-status:
    description: 'Status of the review (approved, changes_requested, commented)'
  review-score:
    description: 'Overall review score (1-10)'
  security-issues:
    description: 'Number of security issues found'
  performance-issues:
    description: 'Number of performance issues found'
  files-analyzed:
    description: 'Number of files analyzed'
  execution-time:
    description: 'Time taken to execute the review in seconds'
