# Secure PR Review Action
# Production-ready AI-powered pull request review workflow
# Security-first design with proper input validation and error handling

name: Secure PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]

# Prevent concurrent reviews on the same PR
concurrency:
  group: secure-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal permissions - principle of least privilege
permissions:
  contents: read
  pull-requests: write

env:
  # Size limits to prevent resource exhaustion
  MAX_DIFF_SIZE: 1048576  # 1MB
  MAX_FILES_CHANGED: 100
  MAX_LINES_CHANGED: 5000

jobs:
  # ============================================
  # Job 1: PR Analysis & Data Collection
  # ============================================
  analyze-pr:
    name: Analyze PR Changes
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      files_changed: ${{ steps.safe-analysis.outputs.files_changed }}
      lines_added: ${{ steps.safe-analysis.outputs.additions }}
      lines_removed: ${{ steps.safe-analysis.outputs.deletions }}
      has_security_sensitive_files: ${{ steps.safe-analysis.outputs.security_sensitive }}
      change_complexity: ${{ steps.safe-analysis.outputs.complexity }}
      analysis_valid: ${{ steps.safe-analysis.outputs.valid }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Safe PR Analysis
        id: safe-analysis
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number: pull_number } = context.issue;
            
            try {
              // Get PR data safely through GitHub API
              const { data: pullRequest } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number
              });
              
              // Validate PR size to prevent resource exhaustion
              const totalChanges = pullRequest.additions + pullRequest.deletions;
              if (totalChanges > parseInt(process.env.MAX_LINES_CHANGED)) {
                core.warning(`PR exceeds maximum line limit (${totalChanges} > ${process.env.MAX_LINES_CHANGED})`);
                core.setOutput('valid', 'false');
                return;
              }
              
              // Get changed files
              const { data: files } = await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number,
                per_page: 100
              });
              
              if (files.length > parseInt(process.env.MAX_FILES_CHANGED)) {
                core.warning(`PR exceeds maximum file limit (${files.length} > ${process.env.MAX_FILES_CHANGED})`);
                core.setOutput('valid', 'false');
                return;
              }
              
              // Extract file names safely
              const fileNames = files.map(f => f.filename);
              const securityPatterns = /(auth|security|password|secret|key|credential|config|env)/i;
              const hasSecurityFiles = fileNames.some(name => securityPatterns.test(name));
              
              // Determine complexity
              let complexity = 'low';
              if (totalChanges >= 500) complexity = 'high';
              else if (totalChanges >= 100) complexity = 'medium';
              
              // Set outputs safely
              core.setOutput('files_changed', JSON.stringify(fileNames));
              core.setOutput('additions', pullRequest.additions);
              core.setOutput('deletions', pullRequest.deletions);
              core.setOutput('security_sensitive', hasSecurityFiles.toString());
              core.setOutput('complexity', complexity);
              core.setOutput('valid', 'true');
              
              core.info(`📊 PR Analysis Complete:`);
              core.info(`  - Files: ${fileNames.length}`);
              core.info(`  - Lines: +${pullRequest.additions} -${pullRequest.deletions}`);
              core.info(`  - Complexity: ${complexity}`);
              core.info(`  - Security files: ${hasSecurityFiles}`);
              
            } catch (error) {
              core.setFailed(`Analysis failed: ${error.message}`);
            }

      - name: Upload Analysis Results
        if: steps.safe-analysis.outputs.valid == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis-${{ github.run_id }}
          path: |
            ${{ steps.safe-analysis.outputs.files_changed }}
          retention-days: 1

  # ============================================
  # Job 2: Secure Code Review
  # ============================================
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: analyze-pr
    if: |
      github.event.pull_request.draft == false &&
      needs.analyze-pr.outputs.analysis_valid == 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Analysis Results
        uses: actions/download-artifact@v4
        with:
          name: pr-analysis-${{ github.run_id }}

      - name: Get Secure PR Diff
        id: secure-diff
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number: pull_number } = context.issue;
            const maxDiffSize = parseInt(process.env.MAX_DIFF_SIZE);
            
            try {
              // Get PR diff with size limit
              const { data: diff } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
                mediaType: {
                  format: 'diff'
                }
              });
              
              // Check diff size
              if (Buffer.byteLength(diff, 'utf8') > maxDiffSize) {
                core.warning(`Diff too large for AI analysis`);
                core.setOutput('skip_review', 'true');
                return;
              }
              
              // Get PR metadata safely
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number
              });
              
              // Sanitize and validate data
              const sanitizedData = {
                title: pr.title.replace(/[<>\"'&]/g, ''),
                body: (pr.body || '').replace(/[<>\"'&]/g, ''),
                author: pr.user.login,
                diff: diff.substring(0, maxDiffSize)
              };
              
              // Write sanitized data to files
              const fs = require('fs');
              fs.writeFileSync('/tmp/pr_data.json', JSON.stringify(sanitizedData));
              fs.writeFileSync('/tmp/pr_diff.patch', sanitizedData.diff);
              
              core.setOutput('skip_review', 'false');
              
            } catch (error) {
              core.setFailed(`Failed to get PR diff: ${error.message}`);
            }

      - name: Secure AI Analysis
        if: steps.secure-diff.outputs.skip_review != 'true'
        id: ai-review
        uses: actions/github-script@v7
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const https = require('https');
            
            try {
              // Read sanitized data
              const prData = JSON.parse(fs.readFileSync('/tmp/pr_data.json', 'utf8'));
              const diff = fs.readFileSync('/tmp/pr_diff.patch', 'utf8');
              
              // Build secure review prompt
              const prompt = {
                model: 'opencode-reviewer',
                messages: [
                  {
                    role: 'system',
                    content: 'You are an expert code reviewer. Respond only with valid JSON containing code review results.'
                  },
                  {
                    role: 'user',
                    content: `Analyze this PR and provide review in JSON format:\n\nTitle: ${prData.title}\nAuthor: @${prData.author}\nDiff: ${diff.substring(0, 50000)}`
                  }
                ],
                temperature: 0.3,
                max_tokens: 2000
              };
              
              // Make secure API call with error handling
              const response = await new Promise((resolve, reject) => {
                const postData = JSON.stringify(prompt);
                const options = {
                  hostname: 'api.opencode.ai',
                  port: 443,
                  path: '/v1/chat/completions',
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.OPENCODE_API_KEY}`,
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(postData)
                  },
                  timeout: 30000 // 30 second timeout
                };
                
                const req = https.request(options, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => {
                    if (res.statusCode === 200) {
                      resolve(JSON.parse(data));
                    } else {
                      reject(new Error(`API error: ${res.statusCode}`));
                    }
                  });
                });
                
                req.on('error', reject);
                req.on('timeout', () => {
                  req.destroy();
                  reject(new Error('Request timeout'));
                });
                
                req.write(postData);
                req.end();
              });
              
              // Validate and sanitize response
              const reviewContent = response.choices[0].message.content;
              const reviewData = JSON.parse(reviewContent);
              
              // Basic validation of review structure
              if (!reviewData.summary || typeof reviewData.overall_score !== 'number') {
                throw new Error('Invalid review format from AI');
              }
              
              // Write sanitized review
              fs.writeFileSync('/tmp/review_result.json', JSON.stringify(reviewData, null, 2));
              core.setOutput('review_status', 'completed');
              
            } catch (error) {
              core.warning(`AI review failed: ${error.message}`);
              core.setOutput('review_status', 'failed');
              
              // Create fallback review
              const fallbackReview = {
                summary: 'AI review unavailable - manual review required',
                issues: [],
                overall_score: 5,
                approved: false,
                review_comments: ['AI analysis failed - requires human review']
              };
              fs.writeFileSync('/tmp/review_result.json', JSON.stringify(fallbackReview, null, 2));
            }

      - name: Post Secure Review Comments
        if: steps.ai-review.outputs.review_status != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            try {
              const review = JSON.parse(fs.readFileSync('/tmp/review_result.json', 'utf8'));
              
              // Build secure comment (sanitize output)
              const summaryComment = `## 🔒 Secure AI Code Review

### 📋 Summary
${review.summary.replace(/[<>]/g, '')}

### 📊 Overall Score: ${review.overall_score}/10
${review.approved ? '✅ **Recommended for approval**' : '⚠️ **Changes requested**'}

### 💬 Review Notes
${review.review_comments.map(c => '- ' + c.replace(/[<>]/g, '')).join('\n')}

---
*Security-focused review completed*`;
              
              // Post comment safely
              const { owner, repo, number: issue_number } = context.issue;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: summaryComment
              });
              
              // Create check run
              const conclusion = review.approved ? 'success' : 'failure';
              const title = review.approved ? 
                `✅ AI Review Passed (Score: ${review.overall_score}/10)` : 
                `❌ AI Review Failed (Score: ${review.overall_score}/10)`;
              
              await github.rest.checks.create({
                owner,
                repo,
                name: 'Secure AI Code Review',
                head_sha: context.payload.pull_request.head.sha,
                status: 'completed',
                conclusion: conclusion,
                output: {
                  title: title,
                  summary: 'Automated security-focused code review completed.'
                }
              });
              
            } catch (error) {
              core.setFailed(`Failed to post review: ${error.message}`);
            }

  # ============================================
  # Job 3: Security Analysis
  # ============================================
  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: analyze-pr
    if: |
      github.event.pull_request.draft == false &&
      needs.analyze-pr.outputs.analysis_valid == 'true' &&
      (needs.analyze-pr.outputs.has_security_sensitive_files == 'true' ||
       needs.analyze-pr.outputs.change_complexity == 'high')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Security Scans
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number: pull_number } = context.issue;
            
            try {
              // Get changed files for security analysis
              const { data: files } = await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number,
                per_page: 100
              });
              
              // Security-focused file patterns
              const securityPatterns = [
                /password|secret|key|credential|token/i,
                /auth|security|encryption/i,
                /config|env|settings/i,
                /\.env$|config\./i,
                /(id_rsa|id_dsa|id_ecdsa|id_ed25519)$/i
              ];
              
              const securityFiles = files.filter(f => 
                securityPatterns.some(pattern => pattern.test(f.filename))
              );
              
              if (securityFiles.length > 0) {
                core.warning(`Security-sensitive files detected: ${securityFiles.map(f => f.filename).join(', ')}`);
                
                // Post security notice
                const securityComment = `## 🔒 Security Analysis

⚠️ **Security-sensitive files detected** in this PR:
${securityFiles.map(f => `- \`${f.filename}\``).join('\n')}

**Recommendations:**
- Review for hardcoded secrets or credentials
- Verify no sensitive data is exposed
- Consider security team review
- Run additional security scans`;
                
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pull_number,
                  body: securityComment
                });
              }
              
            } catch (error) {
              core.setFailed(`Security analysis failed: ${error.message}`);
            }

  # ============================================
  # Job 4: Final Summary
  # ============================================
  final-summary:
    name: Review Summary
    runs-on: ubuntu-latest
    needs: [analyze-pr, code-review, security-analysis]
    if: always() && github.event.pull_request.draft == false

    steps:
      - name: Create Final Summary
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number: issue_number } = context.issue;
            
            // Determine overall status
            const reviewStatus = '${{ needs.code-review.result }}';
            const securityStatus = '${{ needs.security-analysis.result }}';
            const analysisStatus = '${{ needs.analyze-pr.result }}';
            
            const allPassed = reviewStatus === 'success' && 
                            securityStatus !== 'failure' && 
                            analysisStatus === 'success';
            
            const summary = `## 🔒 Secure PR Review Summary

| Check | Status |
|-------|--------|
| 📊 PR Analysis | ${analysisStatus} |
| 🧠 AI Code Review | ${reviewStatus} |
| 🔐 Security Analysis | ${securityStatus} |

### 📊 Change Statistics
- **Files Changed**: ${'${{ needs.analyze-pr.outputs.files_changed }}' ? JSON.parse('${{ needs.analyze-pr.outputs.files_changed }}').length : 'N/A'}
- **Lines Added**: ${'${{ needs.analyze-pr.outputs.lines_added }}'}
- **Lines Removed**: ${'${{ needs.analyze-pr.outputs.lines_removed }}'}
- **Complexity**: ${'${{ needs.analyze-pr.outputs.change_complexity }}'}

${allPassed ? '✅ **All security checks passed**' : '⚠️ **Some checks require attention**'}

---
*Security-focused review completed with enhanced protection against common vulnerabilities.*`;
            
            // Post summary
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: summary
            });
            
            // Add appropriate labels
            const labels = [];
            const complexity = '${{ needs.analyze-pr.outputs.change_complexity }}';
            
            if (complexity === 'low') labels.push('size/small');
            else if (complexity === 'medium') labels.push('size/medium');
            else if (complexity === 'high') labels.push('size/large');
            
            if ('${{ needs.analyze-pr.outputs.has_security_sensitive_files }}' === 'true') {
              labels.push('security-review');
            }
            
            if (!allPassed) {
              labels.push('needs-review');
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: labels
              });
            }