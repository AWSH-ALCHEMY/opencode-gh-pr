name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to publish (defaults to package.json)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    name: '📦 Publish Release'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Setup Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 'Install Dependencies'
        run: npm ci --ignore-scripts

      - name: 'Build Action Bundles'
        run: npm run build && npm run build:hygiene

      - name: 'Resolve Release Version'
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 'Create Release Commit'
        id: commit
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A -f dist
          tree="$(git write-tree)"
          parent="$(git rev-parse HEAD)"
          commit="$(printf 'build: publish dist artifacts for v%s\n\nAutomated release commit generated by GitHub Actions.\n' "$VERSION" | git commit-tree "$tree" -p "$parent")"
          git tag -a "v${VERSION}" "$commit" -m "v${VERSION}"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          git push origin "refs/tags/v${VERSION}"

      - name: 'Create GitHub Release'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit }}
        run: |
          gh release create "v${VERSION}" \
            --target "${COMMIT_SHA}" \
            --title "v${VERSION}" \
            --generate-notes
