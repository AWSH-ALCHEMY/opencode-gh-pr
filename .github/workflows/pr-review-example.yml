name: 'Secure PR Review - Professional Example'

# Trigger on PR events
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]

# Prevent concurrent reviews on the same PR
concurrency:
  group: secure-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal permissions - principle of least privilege
permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================
  # Main Review Job
  # ============================================
  secure-review:
    name: '🔒 Secure PR Review'
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 'Run Secure PR Review Action'
        id: review
        uses: ./
        with:
          # Core Configuration
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ai-api-key: ${{ secrets.OPENCODE_API_KEY }}
          ai-model: 'opencode-reviewer'
          
          # Review Configuration
          approved-threshold: '7'
          max-diff-size: '1048576'  # 1MB
          max-files: '100'
          max-lines: '5000'
          
          # Feature Flags
          security-analysis: 'true'
          performance-check: 'true'
          documentation-check: 'true'
          
          # Advanced Options
          config-file: '.github/pr-review-config.yml'
          
          # Output Control
          create-checks: 'true'
          post-comments: 'true'
          apply-labels: 'true'
        
        continue-on-error: true  # Don't fail the workflow if review fails
      
      - name: 'Review Results Summary'
        if: always()
        run: |
          echo "🔒 Secure PR Review Results:"
          echo "  Status: ${{ steps.review.outputs.review-status }}"
          echo "  Score: ${{ steps.review.outputs.review-score }}/10"
          echo "  Security Issues: ${{ steps.review.outputs.security-issues }}"
          echo "  Performance Issues: ${{ steps.review.outputs.performance-issues }}"
          echo "  Files Analyzed: ${{ steps.review.outputs.files-analyzed }}"
          echo "  Execution Time: ${{ steps.review.outputs.execution-time }}s"

  # ============================================
  # Security Scan Job (Conditional)
  # ============================================
  security-scan:
    name: '🔐 Security Scan'
    runs-on: ubuntu-latest
    needs: secure-review
    if: |
      always() &&
      needs.secure-review.result == 'success' &&
      (github.event.pull_request.draft == false)
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
      
      - name: 'Run CodeQL Analysis'
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          languages: javascript, typescript, python
          
      - name: 'Run Secret Detection'
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # ============================================
  # Performance Analysis Job (Conditional)
  # ============================================
  performance-analysis:
    name: '⚡ Performance Analysis'
    runs-on: ubuntu-latest
    needs: secure-review
    if: |
      always() &&
      needs.secure-review.result == 'success' &&
      (github.event.pull_request.draft == false)
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
      
      - name: 'Analyze Bundle Size Impact'
        run: |
          echo "📦 Analyzing potential bundle size impact..."
          
          # Check for dependency changes
          if git diff --name-only origin/${{ github.base_ref }} | grep -q "package.json\|package-lock.json\|yarn.lock\|pnpm-lock.yaml"; then
            echo "Dependency changes detected"
            
            # List new dependencies
            NEW_DEPS=$(git diff origin/${{ github.base_ref }} -- package.json 2>/dev/null | grep "^\\+" | grep -v "^\\+\\+" || true)
            
            if [ -n "$NEW_DEPS" ]; then
              echo "New dependencies added:"
              echo "$NEW_DEPS"
            fi
          fi

  # ============================================
  # Documentation Check Job (Conditional)
  # ============================================
  docs-check:
    name: '📚 Documentation Check'
    runs-on: ubuntu-latest
    needs: secure-review
    if: |
      always() &&
      needs.secure-review.result == 'success' &&
      (github.event.pull_request.draft == false)
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 'Check Documentation Updates'
        run: |
          echo "📚 Checking documentation..."
          
          # Get changed files
          FILES=$(git diff --name-only origin/${{ github.base_ref }})
          
          # Check if code changes have corresponding doc updates
          HAS_CODE_CHANGES=$(echo "$FILES" | grep -E "\\.(js|ts|jsx|tsx|py|go|rs|java)$" || true)
          HAS_DOC_CHANGES=$(echo "$FILES" | grep -E "(README|CHANGELOG|docs/|\\.md$)" || true)
          
          if [ -n "$HAS_CODE_CHANGES" ] && [ -z "$HAS_DOC_CHANGES" ]; then
            echo "ℹ️ Code changes detected without documentation updates"
            
            # Check if this is a significant change
            LINES_CHANGED=$(git diff --numstat origin/${{ github.base_ref }} | awk '{s+=$1+$2} END {print s}')
            
            if [ "$LINES_CHANGED" -gt 100 ]; then
              echo "📋 Significant code changes detected - consider updating documentation"
            fi
          fi

  # ============================================
  # Final Summary Job
  # ============================================
  final-summary:
    name: '📊 Final Summary'
    runs-on: ubuntu-latest
    needs: [secure-review, security-scan, performance-analysis, docs-check]
    if: always()
    
    steps:
      - name: 'Create Final Summary'
        run: |
          echo "## 🔒 Secure PR Review Summary"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| 🧠 AI Code Review | ${{ needs.secure-review.result }} |"
          echo "| 🔐 Security Scan | ${{ needs.security-scan.result }} |"
          echo "| ⚡ Performance Analysis | ${{ needs.performance-analysis.result }} |"
          echo "| 📚 Documentation Check | ${{ needs.docs-check.result }} |"
          echo ""
          echo "---"
          echo "*Professional security-focused review completed*"
          
          # Set overall status
          if [ "${{ needs.secure-review.result }}" = "success" ]; then
            echo "✅ **All security checks completed successfully**"
          else
            echo "⚠️ **Some checks require attention**"
          fi