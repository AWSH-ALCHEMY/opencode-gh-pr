name: 'Secure PR Review - Professional Example'

# Trigger on PR events
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

# Prevent concurrent reviews on the same PR
concurrency:
  group: secure-pr-review-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Minimal permissions - principle of least privilege
permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ============================================
  # Build the Action
  # ============================================
  build:
    name: '🏗️ Build Action'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 'Install Dependencies'
        run: npm ci --ignore-scripts
      - name: 'Build Action'
        run: npm run build
      - name: 'Upload Build Artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: action-dist
          path: dist/

  # ============================================
  # Main Review Job
  # ============================================
  secure-review:
    name: '🔒 Secure PR Review'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 'Download Build Artifacts'
        uses: actions/download-artifact@v4
        with:
          name: action-dist
          path: dist/

      - name: 'Run Secure PR Review Action'
        id: review
        uses: ./
        with:
          # Core Configuration
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Review Configuration
          approved-threshold: '7'
          max-diff-size: '1048576'  # 1MB
          max-files: '100'
          max-lines: '5000'
          
          # Feature Flags
          security-analysis: 'true'
          performance-check: 'true'
          documentation-check: 'true'
          
          # Advanced Options
          config-file: '.github/pr-review-config.yml'
          
          # Output Control
          create-checks: 'true'
          post-comments: 'true'
          apply-labels: 'true'
        
        continue-on-error: true  # Don't fail the workflow if review fails
      
      - name: 'Review Results Summary'
        if: always()
        run: |
          echo "🔒 Secure PR Review Results:"
          echo "  Status: ${{ steps.review.outputs.review-status }}"
          echo "  Score: ${{ steps.review.outputs.review-score }}/10"
          echo "  Security Issues: ${{ steps.review.outputs.security-issues }}"
          echo "  Performance Issues: ${{ steps.review.outputs.performance-issues }}"
          echo "  Files Analyzed: ${{ steps.review.outputs.files-analyzed }}"
          echo "  Execution Time: ${{ steps.review.outputs.execution-time }}s"

