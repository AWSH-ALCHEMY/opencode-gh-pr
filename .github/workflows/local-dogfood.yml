name: '🐕 Local Dogfood - Secure PR Review Action'

on:
  pull_request:
    paths:
      - 'src/**'
      - 'action.yml'
      - 'package.json'
      - 'Dockerfile*'

concurrency:
  group: dogfood-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dogfood:
    name: '🐕 Dogfood Test'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 'Install Dependencies'
        run: npm ci --ignore-scripts
      
      - name: 'Run Linting'
        run: npm run lint
      
      - name: 'Run Type Checking'
        run: npm run typecheck
      
      - name: 'Run Tests'
        run: npm test
      
      - name: 'Build Action'
        run: npm run build
      
      - name: 'Run Secure PR Review Action (Dogfood)'
        id: dogfood-review
        uses: ./  # Use the action from the current directory
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
