name: "Repo Hygiene Review"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  hygiene-ai:
    name: "🧠 Repo Hygiene AI"
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci --ignore-scripts

      - name: "Build hygiene runner"
        run: npm run build:hygiene

      - name: "Validate policy JSON"
        run: jq . .github/repo-hygiene-policy.json >/dev/null

      - name: "Install OpenCode CLI"
        run: npm install -g opencode-ai

      - name: "Run AI hygiene checks"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node dist/hygiene/index.js
