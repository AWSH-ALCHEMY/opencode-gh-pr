name: "Repo Hygiene Review"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call:
    inputs:
      base_sha:
        description: 'Base commit SHA for the hygiene comparison'
        required: true
        type: string
      head_sha:
        description: 'Head commit SHA for the hygiene comparison'
        required: true
        type: string
      policy_path:
        description: 'Path to the repo hygiene policy file'
        required: false
        type: string
        default: '.github/repo-hygiene-policy.json'
      prompt_registry_path:
        description: 'Path to the prompt registry used by the hygiene reviewer'
        required: false
        type: string
        default: 'prompts/registry.json'

permissions:
  contents: read

jobs:
  hygiene-ai:
    name: "🧠 Repo Hygiene AI"
    if: github.event_name == 'workflow_call' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event_name == 'workflow_call' && inputs.base_sha || github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event_name == 'workflow_call' && inputs.head_sha || github.event.pull_request.head.sha }}
      REPO_HYGIENE_POLICY_PATH: ${{ github.event_name == 'workflow_call' && inputs.policy_path || '.github/repo-hygiene-policy.json' }}
      PROMPT_REGISTRY_PATH: ${{ github.event_name == 'workflow_call' && inputs.prompt_registry_path || 'prompts/registry.json' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Checkout provider action"
        uses: actions/checkout@v6
        with:
          repository: AWSH-ALCHEMY/opencode-gh-pr
          ref: ${{ github.workflow_sha }}
          path: .provider

      - name: "Resolve repo hygiene policy path"
        id: policy_contract
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const workspaceRoot = process.env.GITHUB_WORKSPACE || process.cwd();
            const policyInput = (process.env.REPO_HYGIENE_POLICY_PATH || '.github/repo-hygiene-policy.json').trim();
            if (!policyInput) {
              throw new Error('REPO_HYGIENE_POLICY_PATH must not be empty.');
            }
            if (path.isAbsolute(policyInput)) {
              throw new Error('REPO_HYGIENE_POLICY_PATH must be repo-relative.');
            }
            const resolvedPolicy = path.resolve(workspaceRoot, policyInput);
            const relativePolicy = path.relative(path.resolve(workspaceRoot), resolvedPolicy);
            if (relativePolicy.startsWith('..') || path.isAbsolute(relativePolicy)) {
              throw new Error(`REPO_HYGIENE_POLICY_PATH escapes the workspace: ${policyInput}`);
            }
            if (!fs.existsSync(resolvedPolicy)) {
              throw new Error(`Missing policy file: ${resolvedPolicy}`);
            }
            core.setOutput('policy_file', resolvedPolicy);

      - name: "Validate policy JSON"
        run: jq . "${{ steps.policy_contract.outputs.policy_file }}" >/dev/null

      - name: "Run AI hygiene checks"
        uses: ./.provider/.github/actions/repo-hygiene
        with:
          base_sha: ${{ env.BASE_SHA }}
          head_sha: ${{ env.HEAD_SHA }}
          policy_path: ${{ env.REPO_HYGIENE_POLICY_PATH }}
          prompt_registry_path: ${{ env.PROMPT_REGISTRY_PATH }}
