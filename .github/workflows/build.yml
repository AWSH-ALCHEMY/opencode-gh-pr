name: 'Build and Test'

on:
  pull_request:
    paths:
      - 'src/**'
      - 'action.yml'
      - 'package.json'
      - 'Dockerfile*'

jobs:
  build-and-test:
    name: '🏗️ Build & Test'
    runs-on: ubuntu-latest
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 'Install Dependencies'
        run: npm ci --ignore-scripts
      
      - name: 'Run Linting'
        run: npm run lint
      
      - name: 'Run Type Checking'
        run: npm run typecheck
      
      - name: 'Run Tests'
        run: npm test
      
      - name: 'Build Action'
        run: npm run build

      - name: 'Upload Build Artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: action-dist
          path: dist/
