name: '🐕 Dogfood - Secure PR Review Action'

# This workflow tests the action on itself - dogfooding!
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'action.yml'
      - 'package.json'
      - 'Dockerfile*'

# Prevent concurrent reviews on the same PR
concurrency:
  group: dogfood-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal permissions - principle of least privilege
permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================
  # Build and Test the Action
  # ============================================
  build-and-test:
    name: '🏗️ Build & Test'
    runs-on: ubuntu-latest
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 'Install Dependencies'
        run: npm ci --ignore-scripts
      
      - name: 'Run Linting'
        run: npm run lint
      
      - name: 'Run Type Checking'
        run: npm run typecheck
      
      - name: 'Run Tests'
        run: npm test
      
      - name: 'Build Action'
        run: npm run build
      
      - name: 'Upload Build Artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: action-dist-${{ github.run_id }}
          path: dist/
          retention-days: 1

  # ============================================
  # Dogfood Test - Use the Action Locally
  # ============================================
  dogfood-review:
    name: '🐕 Dogfood Test'
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 'Download Build Artifacts'
        uses: actions/download-artifact@v4
        with:
          name: action-dist-${{ github.run_id }}
          path: dist/
      
      - name: 'Run Secure PR Review Action (Dogfood)'
        id: dogfood-review
        uses: ./  # Use the action from the current directory
        with:
          # Core Configuration
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ai-api-key: ${{ secrets.OPENCODE_API_KEY }}
          ai-model: 'opencode-reviewer'
          
          # Review Configuration
          approved-threshold: '7'
          max-diff-size: '1048576'  # 1MB
          max-files: '100'
          max-lines: '5000'
          
          # Feature Flags
          security-analysis: 'true'
          performance-check: 'true'
          documentation-check: 'true'
          
          # Output Control
          create-checks: 'true'
          post-comments: 'true'
          apply-labels: 'true'
        
        continue-on-error: true  # Don't fail if review fails
      
      - name: 'Dogfood Results Summary'
        if: always()
        run: |
          echo "🐕 Dogfood Test Results:"
          echo "  Status: ${{ steps.dogfood-review.outputs.review-status }}"
          echo "  Score: ${{ steps.dogfood-review.outputs.review-score }}/10"
          echo "  Security Issues: ${{ steps.dogfood-review.outputs.security-issues }}"
          echo "  Performance Issues: ${{ steps.dogfood-review.outputs.performance-issues }}"
          echo "  Files Analyzed: ${{ steps.dogfood-review.outputs.files-analyzed }}"
          echo "  Execution Time: ${{ steps.dogfood-review.outputs.execution-time }}s"
          
          if [ "${{ steps.dogfood-review.outcome }}" = "success" ]; then
            echo "✅ Dogfood test passed!"
          else
            echo "⚠️ Dogfood test completed with warnings"
          fi

  # ============================================
  # Integration Test - Use Published Action
  # ============================================
  integration-test:
    name: '🔗 Integration Test'
    runs-on: ubuntu-latest
    needs: dogfood-review
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 'Run Secure PR Review Action (Integration)'
        id: integration-review
        uses: ./  # Use published version
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ai-api-key: ${{ secrets.OPENCODE_API_KEY }}
          config-file: '.github/pr-review-config.yml'
        
        continue-on-error: true
      
      - name: 'Integration Test Summary'
        if: always()
        run: |
          echo "🔗 Integration Test Results:"
          echo "  Status: ${{ steps.integration-review.outputs.review-status }}"
          echo "  Score: ${{ steps.integration-review.outputs.review-score }}/10"
          echo "  Files Analyzed: ${{ steps.integration-review.outputs.files-analyzed }}"
          
          if [ "${{ steps.integration-review.outcome }}" = "success" ]; then
            echo "✅ Integration test passed!"
          else
            echo "⚠️ Integration test completed with warnings"
          fi