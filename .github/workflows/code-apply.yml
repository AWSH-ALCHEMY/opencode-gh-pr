name: "Code Apply Command"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  resolve-command:
    name: "Resolve /code_apply"
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      should_apply: ${{ steps.resolve.outputs.should_apply }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      child_pr_base_ref: ${{ steps.resolve.outputs.child_pr_base_ref }}
      child_pr_base_reason: ${{ steps.resolve.outputs.child_pr_base_reason }}
      is_fork: ${{ steps.resolve.outputs.is_fork }}
      target_ids_json: ${{ steps.resolve.outputs.target_ids_json }}
      target_groups_json: ${{ steps.resolve.outputs.target_groups_json }}
      feedback: ${{ steps.resolve.outputs.feedback }}
      policy_profile: ${{ steps.resolve.outputs.policy_profile }}
      policy_source: ${{ steps.resolve.outputs.policy_source }}
      requested_by: ${{ steps.resolve.outputs.requested_by }}
      force_ack: ${{ steps.resolve.outputs.force_ack }}
      command_text: ${{ steps.resolve.outputs.command_text }}
    steps:
      - name: "Parse command and validate context"
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const payload = context.payload;
            const comment = payload.comment;
            const body = (comment?.body || '').trim();
            const firstLine = body.split(/\r?\n/)[0] || '';
            const match = firstLine.match(/^\/code_apply(?:\s+(.+))?$/i);

            const setOutput = (key, value) => core.setOutput(key, value);
            setOutput('should_run', match ? 'true' : 'false');
            setOutput('should_apply', 'false');
            setOutput('pr_number', '');
            setOutput('head_ref', '');
            setOutput('head_sha', '');
            setOutput('base_ref', '');
            setOutput('child_pr_base_ref', '');
            setOutput('child_pr_base_reason', '');
            setOutput('is_fork', '');
            setOutput('target_ids_json', '[]');
            setOutput('target_groups_json', '[]');
            setOutput('feedback', '');
            setOutput('policy_profile', '');
            setOutput('policy_source', '');
            setOutput('requested_by', comment?.user?.login || '');
            setOutput('force_ack', 'false');
            setOutput('command_text', firstLine);

            if (!match) {
              return;
            }

            if (comment?.user?.type === 'Bot') {
              setOutput('feedback', 'Ignoring bot command comment.');
              return;
            }

            const defaultPolicy = {
              version: 1,
              activeProfile: 'balanced',
              profiles: {
                balanced: {
                  allowedAuthorAssociations: ['OWNER', 'MEMBER', 'COLLABORATOR'],
                  requireLabel: '',
                  allowAll: true,
                  maxCommentsPerRun: 50,
                  requireForceForAll: true,
                  splitByTopic: true,
                  simpleBatchTopics: ['rename-style', 'docs'],
                  maxTopicGroupsPerRun: 8,
                },
              },
            };
            const policyPath = '.github/code-apply-policy.json';
            const defaultBranch = payload.repository?.default_branch || 'main';

            const normalizeProfile = (raw) => {
              const allowedRaw = Array.isArray(raw?.allowedAuthorAssociations)
                ? raw.allowedAuthorAssociations
                : defaultPolicy.profiles.balanced.allowedAuthorAssociations;
              const allowedAuthorAssociations = Array.from(
                new Set(
                  allowedRaw
                    .map((value) => String(value).trim().toUpperCase())
                    .filter((value) => value.length > 0)
                )
              );
              const requireLabel = typeof raw?.requireLabel === 'string' ? raw.requireLabel.trim() : '';
              const allowAll = typeof raw?.allowAll === 'boolean' ? raw.allowAll : defaultPolicy.profiles.balanced.allowAll;
              const maxCommentsPerRunRaw = Number(raw?.maxCommentsPerRun);
              const maxCommentsPerRun = Number.isInteger(maxCommentsPerRunRaw) && maxCommentsPerRunRaw > 0
                ? maxCommentsPerRunRaw
                : defaultPolicy.profiles.balanced.maxCommentsPerRun;
              const requireForceForAll = typeof raw?.requireForceForAll === 'boolean'
                ? raw.requireForceForAll
                : defaultPolicy.profiles.balanced.requireForceForAll;
              const splitByTopic = typeof raw?.splitByTopic === 'boolean'
                ? raw.splitByTopic
                : defaultPolicy.profiles.balanced.splitByTopic;
              const simpleBatchTopicsRaw = Array.isArray(raw?.simpleBatchTopics)
                ? raw.simpleBatchTopics
                : defaultPolicy.profiles.balanced.simpleBatchTopics;
              const simpleBatchTopics = Array.from(
                new Set(
                  simpleBatchTopicsRaw
                    .map((value) => String(value).trim().toLowerCase())
                    .filter((value) => value.length > 0)
                )
              );
              const maxTopicGroupsPerRunRaw = Number(raw?.maxTopicGroupsPerRun);
              const maxTopicGroupsPerRun = Number.isInteger(maxTopicGroupsPerRunRaw) && maxTopicGroupsPerRunRaw > 0
                ? maxTopicGroupsPerRunRaw
                : defaultPolicy.profiles.balanced.maxTopicGroupsPerRun;
              return {
                allowedAuthorAssociations,
                requireLabel,
                allowAll,
                maxCommentsPerRun,
                requireForceForAll,
                splitByTopic,
                simpleBatchTopics,
                maxTopicGroupsPerRun,
              };
            };

            let policyDoc = defaultPolicy;
            try {
              const contentResponse = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: policyPath,
                ref: defaultBranch,
              });
              if (!Array.isArray(contentResponse.data) && typeof contentResponse.data.content === 'string') {
                const decoded = Buffer.from(contentResponse.data.content, 'base64').toString('utf8');
                const parsed = JSON.parse(decoded);
                const activeProfile = typeof parsed?.activeProfile === 'string' ? parsed.activeProfile : defaultPolicy.activeProfile;
                const profiles = parsed?.profiles && typeof parsed.profiles === 'object' ? parsed.profiles : defaultPolicy.profiles;
                policyDoc = {
                  version: Number(parsed?.version) || defaultPolicy.version,
                  activeProfile,
                  profiles,
                };
              } else {
                core.warning(`Policy file at ${policyPath} on ${defaultBranch} is not a file. Using defaults.`);
              }
            } catch (error) {
              core.warning(`Unable to load ${policyPath} from ${defaultBranch}. Using defaults. ${error instanceof Error ? error.message : String(error)}`);
            }

            const profileName = String(policyDoc.activeProfile || defaultPolicy.activeProfile);
            const rawProfile = policyDoc.profiles?.[profileName] || defaultPolicy.profiles.balanced;
            const profile = normalizeProfile(rawProfile);
            setOutput('policy_profile', profileName);
            setOutput('policy_source', `${defaultBranch}:${policyPath}`);

            const assoc = String(comment?.author_association || 'NONE').toUpperCase();
            if (!profile.allowedAuthorAssociations.includes(assoc)) {
              setOutput(
                'feedback',
                `Author association \`${assoc}\` is not allowed by policy profile \`${profileName}\`. Allowed: ${profile.allowedAuthorAssociations.join(', ')}.`
              );
              return;
            }

            let prNumber = null;
            if (eventName === 'issue_comment') {
              if (!payload.issue?.pull_request) {
                setOutput('feedback', '`/code_apply` only works on pull requests.');
                return;
              }
              prNumber = payload.issue.number;
            } else if (eventName === 'pull_request_review_comment') {
              prNumber = payload.pull_request?.number || null;
            }

            if (!prNumber) {
              setOutput('feedback', 'Unable to determine pull request number.');
              return;
            }

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            setOutput('pr_number', String(prNumber));

            if (pr.data.state !== 'open') {
              setOutput(
                'feedback',
                `\`/code_apply\` only runs on open pull requests. PR #${prNumber} is currently \`${pr.data.state}\`.`
              );
              return;
            }

            if (pr.data.state !== 'open') {
              setOutput(
                'feedback',
                `\`/code_apply\` only runs on open pull requests. PR #${prNumber} is currently \`${pr.data.state}\`.`
              );
              return;
            }

            const isFork = pr.data.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`;
            setOutput('head_ref', pr.data.head.ref);
            setOutput('head_sha', pr.data.head.sha);
            setOutput('base_ref', pr.data.base.ref);
            setOutput('is_fork', isFork ? 'true' : 'false');

            let childPrBaseRef = pr.data.head.ref;
            let childPrBaseReason = 'source-head';
            try {
              await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: pr.data.head.ref,
              });
            } catch (error) {
              childPrBaseRef = pr.data.base.ref;
              childPrBaseReason = 'source-head-missing';
              core.warning(
                `Source head branch \`${pr.data.head.ref}\` is unavailable; child PR base will fallback to \`${pr.data.base.ref}\`.`
              );
            }
            setOutput('child_pr_base_ref', childPrBaseRef);
            setOutput('child_pr_base_reason', childPrBaseReason);

            if (isFork) {
              setOutput('feedback', 'Cannot apply changes automatically for forked PRs with default token permissions.');
              return;
            }

            if (profile.requireLabel) {
              const labels = pr.data.labels
                .map((label) => (typeof label === 'string' ? label : label?.name || ''))
                .filter((label) => label.length > 0);
              if (!labels.includes(profile.requireLabel)) {
                setOutput(
                  'feedback',
                  `Policy profile \`${profileName}\` requires label \`${profile.requireLabel}\` before running \`/code_apply\`.`
                );
                return;
              }
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: profile.requireLabel,
                });
              } catch (error) {
                core.warning(
                  `Unable to consume required label \`${profile.requireLabel}\` on PR #${prNumber}: ${error instanceof Error ? error.message : String(error)}`
                );
              }
            }

            const arg = (match[1] || '').trim();
            const rawTokens = arg ? arg.split(/\s+/).map((token) => token.trim()).filter((token) => token.length > 0) : [];
            const tokens = rawTokens.map((token) => token.toLowerCase());
            const aiLogins = new Set(['github-actions[bot]', 'github-actions']);
            const targetIds = [];
            let usedForceAll = false;

            const classifyTopic = (reviewComment) => {
              const bodyText = String(reviewComment?.body || '').toLowerCase();
              const filePath = String(reviewComment?.path || '').toLowerCase();
              if (filePath.startsWith('.github/workflows/')) return 'workflow';
              if (bodyText.includes('security') || filePath.includes('auth') || filePath.includes('permission')) return 'security';
              if (bodyText.includes('performance') || bodyText.includes('perf')) return 'performance';
              if (bodyText.includes('refactor')) return 'refactor';
              if (bodyText.includes('test') || filePath.includes('__tests__') || filePath.includes('/test/') || filePath.includes('.test.')) return 'tests';
              if (bodyText.includes('rename') || bodyText.includes('naming') || bodyText.includes('style') || bodyText.includes('typo') || bodyText.includes('spelling')) return 'rename-style';
              if (bodyText.includes('docs') || bodyText.includes('documentation') || filePath.endsWith('.md') || filePath.includes('/docs/')) return 'docs';
              return 'bugfix';
            };

            const toSlug = (value) => String(value)
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 40) || 'topic';

            const validateCommentId = async (id) => {
              const c = await github.rest.pulls.getReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: id,
              });
              const prUrl = c.data.pull_request_url || '';
              const expectedSuffix = `/pulls/${prNumber}`;
              if (!prUrl.endsWith(expectedSuffix)) {
                throw new Error(`Comment ${id} is not on PR #${prNumber}.`);
              }
              if (!aiLogins.has(c.data.user?.login || '')) {
                throw new Error(`Comment ${id} is not an AI review comment.`);
              }
              return c.data;
            };

            if (!arg || (tokens.length === 1 && tokens[0] === 'this')) {
              if (eventName !== 'pull_request_review_comment') {
                setOutput('feedback', 'Use `/code_apply --all` or `/code_apply <comment_id>` in PR conversation comments.');
                return;
              }
              const parentId = comment.in_reply_to_id || null;
              const candidateId = parentId || comment.id;
              try {
                const resolved = await validateCommentId(candidateId);
                targetIds.push(resolved.id);
              } catch (err) {
                const msg = err instanceof Error ? err.message : String(err);
                setOutput('feedback', `Could not resolve target comment: ${msg}`);
                return;
              }
            } else if (tokens.includes('--all')) {
              const validAllTokens = new Set(['--all', '--force', '-force', '-f']);
              const hasInvalidAllToken = tokens.some((token) => !validAllTokens.has(token));
              if (hasInvalidAllToken) {
                setOutput('feedback', 'Invalid `/code_apply --all` usage. Use `/code_apply --all --force`.');
                return;
              }
              const hasForce = tokens.includes('--force') || tokens.includes('-force') || tokens.includes('-f');
              if (profile.requireForceForAll && !hasForce) {
                setOutput(
                  'feedback',
                  `Policy profile \`${profileName}\` requires explicit \`--force\` for \`/code_apply --all\`. Use \`/code_apply --all --force\`.`
                );
                return;
              }
              if (!profile.allowAll) {
                setOutput('feedback', `\`/code_apply --all\` is disabled by policy profile \`${profileName}\`.`);
                return;
              }
              usedForceAll = hasForce;
              setOutput('force_ack', hasForce ? 'true' : 'false');
              const allReviewComments = await github.paginate(
                github.rest.pulls.listReviewComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                }
              );
              const filtered = allReviewComments
                .filter(c => aiLogins.has(c.user?.login || ''))
                .map(c => c.id);
              if (filtered.length === 0) {
                setOutput('feedback', 'No AI inline review comments found to apply.');
                return;
              }
              targetIds.push(...filtered);
            } else if (tokens.length === 1 && /^\d+$/.test(tokens[0])) {
              try {
                const resolved = await validateCommentId(Number(tokens[0]));
                targetIds.push(resolved.id);
              } catch (err) {
                const msg = err instanceof Error ? err.message : String(err);
                setOutput('feedback', `Invalid comment id: ${msg}`);
                return;
              }
            } else {
              setOutput('feedback', 'Invalid command. Use `/code_apply`, `/code_apply <comment_id>`, or `/code_apply --all`.');
              return;
            }

            if (targetIds.length > profile.maxCommentsPerRun) {
              const baseMsg = `Requested ${targetIds.length} comments exceeds policy max (${profile.maxCommentsPerRun}) for profile \`${profileName}\`.`;
              const forceNote = usedForceAll ? ` Force acknowledged by @${comment?.user?.login || 'unknown'} via \`/code_apply --all --force\`.` : '';
              setOutput(
                'feedback',
                `${baseMsg}${forceNote}`
              );
              return;
            }

            const resolvedComments = [];
            for (const id of targetIds) {
              const reviewComment = await validateCommentId(id);
              resolvedComments.push(reviewComment);
            }

            const simpleTopicSet = new Set(profile.simpleBatchTopics);
            const grouped = {};
            for (const reviewComment of resolvedComments) {
              const topic = classifyTopic(reviewComment);
              const bucket = profile.splitByTopic
                ? (simpleTopicSet.has(topic) ? 'simple-batch' : topic)
                : 'all';
              if (!grouped[bucket]) {
                grouped[bucket] = [];
              }
              grouped[bucket].push(reviewComment.id);
            }

            const groups = Object.entries(grouped).map(([topic, ids]) => ({
              topic,
              slug: toSlug(topic),
              ids,
            }));

            if (groups.length > profile.maxTopicGroupsPerRun) {
              setOutput(
                'feedback',
                `Resolved ${groups.length} topic groups which exceeds policy max (${profile.maxTopicGroupsPerRun}) for profile \`${profileName}\`.`
              );
              return;
            }

            setOutput('target_ids_json', JSON.stringify(targetIds));
            setOutput('target_groups_json', JSON.stringify(groups));
            setOutput('should_apply', 'true');

  feedback:
    name: "Command Feedback"
    if: needs.resolve-command.outputs.should_run == 'true' && needs.resolve-command.outputs.should_apply != 'true'
    needs: [resolve-command]
    runs-on: ubuntu-latest
    steps:
      - name: "Post feedback comment"
        id: post_feedback
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ needs.resolve-command.outputs.pr_number }}');
            const body = JSON.parse('${{ toJSON(needs.resolve-command.outputs.feedback) }}');
            if (!prNumber || !body) return;
            const created = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `⚙️ ${body}\n\n<!-- code_apply:managed feedback -->`,
            });
            core.setOutput('comment_id', String(created.data.id));

      - name: "Cleanup prior managed feedback comments"
        uses: actions/github-script@v7
        env:
          CURRENT_COMMENT_ID: ${{ steps.post_feedback.outputs.comment_id }}
        with:
          script: |
            const prNumber = Number('${{ needs.resolve-command.outputs.pr_number }}');
            if (!prNumber) return;
            const currentCommentId = Number(process.env.CURRENT_COMMENT_ID || '0');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const stale = comments.filter((c) =>
              c.user?.login === 'github-actions[bot]' &&
              c.id !== currentCommentId &&
              typeof c.body === 'string' &&
              c.body.includes('<!-- code_apply:managed feedback -->')
            );
            for (const c of stale) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: c.id,
              });
            }

  apply:
    name: "Apply Requested Changes (${{ matrix.group.topic }})"
    if: needs.resolve-command.outputs.should_apply == 'true' && needs.resolve-command.outputs.target_groups_json != '[]'
    needs: [resolve-command]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(needs.resolve-command.outputs.target_groups_json) }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: "Checkout source PR head"
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-command.outputs.head_sha }}
          fetch-depth: 0

      - name: "Create apply branch"
        id: branch
        run: |
          branch_name="codeapply/pr-${{ needs.resolve-command.outputs.pr_number }}/run-${GITHUB_RUN_ID}/${{ matrix.group.slug }}"
          git checkout -b "$branch_name"
          echo "name=$branch_name" >> "$GITHUB_OUTPUT"

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Install OpenCode CLI"
        run: npm install -g opencode-ai

      - name: "Install repository dependencies"
        run: npm ci --ignore-scripts

      - name: "Collect target comments"
        id: collect
        uses: actions/github-script@v7
        env:
          TARGET_IDS_JSON: ${{ toJSON(matrix.group.ids) }}
        with:
          script: |
            const fs = require('fs');
            const ids = JSON.parse(process.env.TARGET_IDS_JSON || '[]');
            const comments = [];
            for (const id of ids) {
              const res = await github.rest.pulls.getReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: id,
              });
              comments.push({
                id: res.data.id,
                node_id: res.data.node_id,
                path: res.data.path,
                line: res.data.line,
                body: res.data.body,
              });
            }
            const promptPath = 'artifacts/code_apply_targets.json';
            fs.mkdirSync('artifacts', { recursive: true });
            fs.writeFileSync(promptPath, JSON.stringify(comments, null, 2));
            core.setOutput('count', String(comments.length));
            core.setOutput('path', promptPath);

      - name: "Resolve code_apply prompt pack"
        id: prompt_contract
        run: |
          prompt_file="$(jq -r '.packs[.active.code_apply].system' prompts/registry.json)"
          if [ -z "$prompt_file" ] || [ "$prompt_file" = "null" ]; then
            echo "Could not resolve code_apply prompt from prompts/registry.json"
            exit 1
          fi
          if [ ! -f "$prompt_file" ]; then
            echo "Resolved prompt file does not exist: $prompt_file"
            exit 1
          fi
          echo "prompt_file=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: "Run OpenCode apply"
        id: opencode
        continue-on-error: true
        timeout-minutes: 15
        run: |
          cat "${{ steps.prompt_contract.outputs.prompt_file }}" > /tmp/code_apply_prompt.txt
          timeout 900 opencode run - --format json < /tmp/code_apply_prompt.txt

      - name: "Filter restricted workflow edits"
        id: restricted
        if: steps.opencode.outcome == 'success'
        run: |
          mapfile -t restricted_files < <(git diff --name-only -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#restricted_files[@]}" -eq 0 ]; then
            echo "has_restricted=false" >> "$GITHUB_OUTPUT"
            echo "restricted_files_json=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${restricted_files[@]}" > /tmp/restricted_workflow_files.txt
          while IFS= read -r file; do
            git checkout -- "$file"
          done < /tmp/restricted_workflow_files.txt

          restricted_json="$(python3 - <<'PY'
          import json
          with open('/tmp/restricted_workflow_files.txt', 'r', encoding='utf-8') as fh:
              files=[line.strip() for line in fh if line.strip()]
          print(json.dumps(files))
          PY
          )"

          echo "has_restricted=true" >> "$GITHUB_OUTPUT"
          {
            echo "restricted_files_json<<EOF"
            echo "$restricted_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### /code_apply: Restricted Edits Skipped"
            echo ""
            echo "The following workflow files were edited by OpenCode and were reverted to avoid push rejection:"
            echo ""
            while IFS= read -r file; do
              echo "- \`$file\`"
            done < /tmp/restricted_workflow_files.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Commit and push if changed"
        id: commit
        if: steps.opencode.outcome == 'success'
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(code_apply): apply requested review fixes (src-pr:#${{ needs.resolve-command.outputs.pr_number }} run:${{ github.run_id }})"
          commit_sha="$(git rev-parse HEAD)"
          git push origin "${{ steps.branch.outputs.name }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"

      - name: "Create child PR"
        id: child_pr
        if: steps.opencode.outcome == 'success' && steps.commit.outputs.changed == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          TARGET_IDS_JSON: ${{ toJSON(matrix.group.ids) }}
        with:
          script: |
            const prNumber = Number('${{ needs.resolve-command.outputs.pr_number }}');
            const childPrBaseRef = '${{ needs.resolve-command.outputs.child_pr_base_ref }}';
            const applyBranch = '${{ steps.branch.outputs.name }}';
            const count = '${{ steps.collect.outputs.count }}';
            const topic = '${{ matrix.group.topic }}';
            const commandText = '${{ needs.resolve-command.outputs.command_text }}';
            const requestedBy = '${{ needs.resolve-command.outputs.requested_by }}';
            const targetIds = JSON.parse(process.env.TARGET_IDS_JSON || '[]');
            const title = `code_apply(${topic}): suggested fixes for PR #${prNumber} (${count} comment(s))`;
            const marker = `<!-- code_apply:source_pr=${prNumber} topic=${topic} -->`;
            const body = [
              marker,
              '',
              `Source PR: #${prNumber}`,
              `Topic: ${topic}`,
              `Requested by: @${requestedBy}`,
              `Command: \`${commandText}\``,
              `Target comment IDs: ${targetIds.join(', ') || 'none'}`,
              `Workflow run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              '',
              'This PR contains AI-applied changes on an isolated branch.',
            ].join('\n');

            core.setOutput('error', '');
            try {
              const created = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                head: applyBranch,
                base: childPrBaseRef,
                body,
              });
              core.setOutput('number', String(created.data.number));
              core.setOutput('url', created.data.html_url);
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.setOutput('error', message);
              throw error;
            }

      - name: "Resolve targeted AI review threads"
        if: steps.opencode.outcome == 'success' && steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          TARGET_IDS_JSON: ${{ toJSON(matrix.group.ids) }}
        with:
          script: |
            const ids = JSON.parse(process.env.TARGET_IDS_JSON || '[]');
            for (const id of ids) {
              try {
                const comment = await github.rest.pulls.getReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: Number(id),
                });
                const nodeId = comment.data.node_id;
                if (!nodeId) continue;
                const nodeResult = await github.graphql(
                  `query($id: ID!) {
                    node(id: $id) {
                      ... on PullRequestReviewComment {
                        pullRequestReviewThread {
                          id
                          isResolved
                        }
                      }
                    }
                  }`,
                  { id: nodeId }
                );
                const threadId = nodeResult?.node?.pullRequestReviewThread?.id;
                const isResolved = nodeResult?.node?.pullRequestReviewThread?.isResolved;
                if (threadId && !isResolved) {
                  await github.graphql(
                    `mutation($threadId: ID!) {
                      resolveReviewThread(input: {threadId: $threadId}) {
                        thread { id isResolved }
                      }
                    }`,
                    { threadId }
                  );
                }
              } catch (error) {
                core.warning(`Failed to resolve thread for review comment ${id}: ${error instanceof Error ? error.message : String(error)}`);
              }
            }

      - name: "Post result comment"
        id: post_result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const opencodeOutcome = '${{ steps.opencode.outcome }}';
            const changed = '${{ steps.commit.outputs.changed }}' === 'true';
            const count = '${{ steps.collect.outputs.count }}';
            const topic = '${{ matrix.group.topic }}' || 'unknown';
            const topicSlug = '${{ matrix.group.slug }}' || 'topic';
            const policyProfile = '${{ needs.resolve-command.outputs.policy_profile }}' || 'unknown';
            const requestedBy = '${{ needs.resolve-command.outputs.requested_by }}' || 'unknown';
            const forceAck = '${{ needs.resolve-command.outputs.force_ack }}' === 'true';
            const childPrUrl = '${{ steps.child_pr.outputs.url }}' || '';
            const childPrNumber = '${{ steps.child_pr.outputs.number }}' || '';
            const childPrOutcome = '${{ steps.child_pr.outcome }}';
            const childPrError = ${{ toJSON(steps.child_pr.outputs.error) }} || '';
            const applyBranch = '${{ steps.branch.outputs.name }}' || '';
            const childPrBaseRef = '${{ needs.resolve-command.outputs.child_pr_base_ref }}' || '';
            const childPrBaseReason = '${{ needs.resolve-command.outputs.child_pr_base_reason }}' || 'source-head';
            const commitSha = '${{ steps.commit.outputs.commit_sha }}' || '';
            const hasRestricted = String('${{ steps.restricted.outputs.has_restricted }}').trim().toLowerCase() === 'true';
            const restrictedFilesOutput = ${{ toJSON(steps.restricted.outputs.restricted_files_json) }};
            let restrictedFiles = [];
            if (typeof restrictedFilesOutput === 'string' && restrictedFilesOutput.trim().length > 0) {
              try {
                const parsed = JSON.parse(restrictedFilesOutput);
                if (Array.isArray(parsed)) {
                  restrictedFiles = parsed;
                }
              } catch (error) {
                core.warning(`Unable to parse restricted_files_json output: ${error.message}`);
              }
            }
            const prNumber = Number('${{ needs.resolve-command.outputs.pr_number }}');
            let body = '';
            if (opencodeOutcome !== 'success') {
              body = `❌ \`/code_apply\` failed for topic \`${topic}\` while running OpenCode for ${count} comment(s). Check workflow logs.`;
            } else if (changed) {
              body = `✅ Applied fixes for topic \`${topic}\` (${count} comment(s)) via \`/code_apply\` on isolated branch \`${applyBranch}\`.`;
              if (childPrUrl) {
                body += `\n\nChild PR: ${childPrUrl}${childPrNumber ? ` (#${childPrNumber})` : ''}`;
              }
              if (childPrOutcome !== 'success') {
                const compareUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/compare/${encodeURIComponent(childPrBaseRef)}...${encodeURIComponent(applyBranch)}?expand=1`;
                body += `\n\n⚠️ Child PR creation failed. Compare branch manually: ${compareUrl}`;
                if (childPrError) {
                  body += `\nFailure reason: \`${childPrError}\``;
                }
              }
              if (commitSha) {
                body += `\nCommit: \`${commitSha}\``;
              }
            } else {
              body = `ℹ️ \`/code_apply\` ran for topic \`${topic}\` (${count} comment(s)), but no file changes were produced.`;
            }
            if (hasRestricted && restrictedFiles.length > 0) {
              body += `\n\n⚠️ Workflow file edits were detected and intentionally skipped to avoid GitHub permission rejection:\n${restrictedFiles.map(f => `- \`${f}\``).join('\n')}`;
            }
            if (forceAck) {
              body += `\n\n⚠️ Force acknowledged by @${requestedBy} via \`/code_apply --all --force\`.`;
            }
            if (childPrBaseReason === 'source-head-missing') {
              body += `\n\nℹ️ Source PR head branch was unavailable, so child PR base fallback was set to \`${childPrBaseRef}\`.`;
            }
            body += `\n\nTopic bucket: \`${topic}\``;
            body += `\n\nPolicy profile: \`${policyProfile}\``;
            body += `\n\n<!-- code_apply:managed result topic=${topicSlug} -->`;
            const created = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
            core.setOutput('comment_id', String(created.data.id));

      - name: "Cleanup prior managed result comments"
        if: always()
        uses: actions/github-script@v7
        env:
          CURRENT_COMMENT_ID: ${{ steps.post_result.outputs.comment_id }}
          TOPIC_SLUG: ${{ matrix.group.slug }}
        with:
          script: |
            const prNumber = Number('${{ needs.resolve-command.outputs.pr_number }}');
            if (!prNumber) return;
            const currentCommentId = Number(process.env.CURRENT_COMMENT_ID || '0');
            const topicSlug = String(process.env.TOPIC_SLUG || 'topic');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const stale = comments.filter((c) =>
              c.user?.login === 'github-actions[bot]' &&
              c.id !== currentCommentId &&
              typeof c.body === 'string' &&
              c.body.includes(`<!-- code_apply:managed result topic=${topicSlug} -->`)
            );
            for (const c of stale) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: c.id,
              });
            }
