name: "Code Apply Command"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  resolve-command:
    name: "Resolve /code_apply"
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      should_apply: ${{ steps.resolve.outputs.should_apply }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      is_fork: ${{ steps.resolve.outputs.is_fork }}
      target_ids_json: ${{ steps.resolve.outputs.target_ids_json }}
      feedback: ${{ steps.resolve.outputs.feedback }}
      policy_profile: ${{ steps.resolve.outputs.policy_profile }}
      policy_source: ${{ steps.resolve.outputs.policy_source }}
    steps:
      - name: "Parse command and validate context"
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const payload = context.payload;
            const comment = payload.comment;
            const body = (comment?.body || '').trim();
            const firstLine = body.split(/\r?\n/)[0] || '';
            const match = firstLine.match(/^\/code_apply(?:\s+(.+))?$/i);

            const setOutput = (key, value) => core.setOutput(key, value);
            setOutput('should_run', match ? 'true' : 'false');
            setOutput('should_apply', 'false');
            setOutput('pr_number', '');
            setOutput('head_ref', '');
            setOutput('is_fork', '');
            setOutput('target_ids_json', '[]');
            setOutput('feedback', '');
            setOutput('policy_profile', '');
            setOutput('policy_source', '');

            if (!match) {
              return;
            }

            if (comment?.user?.type === 'Bot') {
              setOutput('feedback', 'Ignoring bot command comment.');
              return;
            }

            const defaultPolicy = {
              version: 1,
              activeProfile: 'balanced',
              profiles: {
                balanced: {
                  allowedAuthorAssociations: ['OWNER', 'MEMBER', 'COLLABORATOR'],
                  requireLabel: '',
                  allowAll: true,
                  maxCommentsPerRun: 50,
                },
              },
            };
            const policyPath = '.github/code-apply-policy.json';
            const defaultBranch = payload.repository?.default_branch || 'main';

            const normalizeProfile = (raw) => {
              const allowedRaw = Array.isArray(raw?.allowedAuthorAssociations)
                ? raw.allowedAuthorAssociations
                : defaultPolicy.profiles.balanced.allowedAuthorAssociations;
              const allowedAuthorAssociations = Array.from(
                new Set(
                  allowedRaw
                    .map((value) => String(value).trim().toUpperCase())
                    .filter((value) => value.length > 0)
                )
              );
              const requireLabel = typeof raw?.requireLabel === 'string' ? raw.requireLabel.trim() : '';
              const allowAll = typeof raw?.allowAll === 'boolean' ? raw.allowAll : defaultPolicy.profiles.balanced.allowAll;
              const maxCommentsPerRunRaw = Number(raw?.maxCommentsPerRun);
              const maxCommentsPerRun = Number.isInteger(maxCommentsPerRunRaw) && maxCommentsPerRunRaw > 0
                ? maxCommentsPerRunRaw
                : defaultPolicy.profiles.balanced.maxCommentsPerRun;
              return {
                allowedAuthorAssociations,
                requireLabel,
                allowAll,
                maxCommentsPerRun,
              };
            };

            let policyDoc = defaultPolicy;
            try {
              const contentResponse = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: policyPath,
                ref: defaultBranch,
              });
              if (!Array.isArray(contentResponse.data) && typeof contentResponse.data.content === 'string') {
                const decoded = Buffer.from(contentResponse.data.content, 'base64').toString('utf8');
                const parsed = JSON.parse(decoded);
                const activeProfile = typeof parsed?.activeProfile === 'string' ? parsed.activeProfile : defaultPolicy.activeProfile;
                const profiles = parsed?.profiles && typeof parsed.profiles === 'object' ? parsed.profiles : defaultPolicy.profiles;
                policyDoc = {
                  version: Number(parsed?.version) || defaultPolicy.version,
                  activeProfile,
                  profiles,
                };
              } else {
                core.warning(`Policy file at ${policyPath} on ${defaultBranch} is not a file. Using defaults.`);
              }
            } catch (error) {
              core.warning(`Unable to load ${policyPath} from ${defaultBranch}. Using defaults. ${error instanceof Error ? error.message : String(error)}`);
            }

            const profileName = String(policyDoc.activeProfile || defaultPolicy.activeProfile);
            const rawProfile = policyDoc.profiles?.[profileName] || defaultPolicy.profiles.balanced;
            const profile = normalizeProfile(rawProfile);
            setOutput('policy_profile', profileName);
            setOutput('policy_source', `${defaultBranch}:${policyPath}`);

            const assoc = String(comment?.author_association || 'NONE').toUpperCase();
            if (!profile.allowedAuthorAssociations.includes(assoc)) {
              setOutput(
                'feedback',
                `Author association \`${assoc}\` is not allowed by policy profile \`${profileName}\`. Allowed: ${profile.allowedAuthorAssociations.join(', ')}.`
              );
              return;
            }

            let prNumber = null;
            if (eventName === 'issue_comment') {
              if (!payload.issue?.pull_request) {
                setOutput('feedback', '`/code_apply` only works on pull requests.');
                return;
              }
              prNumber = payload.issue.number;
            } else if (eventName === 'pull_request_review_comment') {
              prNumber = payload.pull_request?.number || null;
            }

            if (!prNumber) {
              setOutput('feedback', 'Unable to determine pull request number.');
              return;
            }

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const isFork = pr.data.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`;
            setOutput('pr_number', String(prNumber));
            setOutput('head_ref', pr.data.head.ref);
            setOutput('is_fork', isFork ? 'true' : 'false');

            if (isFork) {
              setOutput('feedback', 'Cannot apply changes automatically for forked PRs with default token permissions.');
              return;
            }

            if (profile.requireLabel) {
              const labels = pr.data.labels
                .map((label) => (typeof label === 'string' ? label : label?.name || ''))
                .filter((label) => label.length > 0);
              if (!labels.includes(profile.requireLabel)) {
                setOutput(
                  'feedback',
                  `Policy profile \`${profileName}\` requires label \`${profile.requireLabel}\` before running \`/code_apply\`.`
                );
                return;
              }
            }

            const arg = (match[1] || '').trim();
            const aiLogins = new Set(['github-actions[bot]', 'github-actions']);
            const targetIds = [];

            const validateCommentId = async (id) => {
              const c = await github.rest.pulls.getReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: id,
              });
              const prUrl = c.data.pull_request_url || '';
              const expectedSuffix = `/pulls/${prNumber}`;
              if (!prUrl.endsWith(expectedSuffix)) {
                throw new Error(`Comment ${id} is not on PR #${prNumber}.`);
              }
              if (!aiLogins.has(c.data.user?.login || '')) {
                throw new Error(`Comment ${id} is not an AI review comment.`);
              }
              return id;
            };

            if (!arg || arg.toLowerCase() === 'this') {
              if (eventName !== 'pull_request_review_comment') {
                setOutput('feedback', 'Use `/code_apply --all` or `/code_apply <comment_id>` in PR conversation comments.');
                return;
              }
              const parentId = comment.in_reply_to_id || null;
              const candidateId = parentId || comment.id;
              try {
                targetIds.push(await validateCommentId(candidateId));
              } catch (err) {
                const msg = err instanceof Error ? err.message : String(err);
                setOutput('feedback', `Could not resolve target comment: ${msg}`);
                return;
              }
            } else if (arg === '--all') {
              if (!profile.allowAll) {
                setOutput('feedback', `\`/code_apply --all\` is disabled by policy profile \`${profileName}\`.`);
                return;
              }
              const allReviewComments = await github.paginate(
                github.rest.pulls.listReviewComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                }
              );
              const filtered = allReviewComments
                .filter(c => aiLogins.has(c.user?.login || ''))
                .map(c => c.id);
              if (filtered.length === 0) {
                setOutput('feedback', 'No AI inline review comments found to apply.');
                return;
              }
              targetIds.push(...filtered);
            } else if (/^\d+$/.test(arg)) {
              try {
                targetIds.push(await validateCommentId(Number(arg)));
              } catch (err) {
                const msg = err instanceof Error ? err.message : String(err);
                setOutput('feedback', `Invalid comment id: ${msg}`);
                return;
              }
            } else {
              setOutput('feedback', 'Invalid command. Use `/code_apply`, `/code_apply <comment_id>`, or `/code_apply --all`.');
              return;
            }

            if (targetIds.length > profile.maxCommentsPerRun) {
              setOutput(
                'feedback',
                `Requested ${targetIds.length} comments exceeds policy max (${profile.maxCommentsPerRun}) for profile \`${profileName}\`.`
              );
              return;
            }

            setOutput('target_ids_json', JSON.stringify(targetIds));
            setOutput('should_apply', 'true');

  feedback:
    name: "Command Feedback"
    if: needs.resolve-command.outputs.should_run == 'true' && needs.resolve-command.outputs.should_apply != 'true'
    needs: [resolve-command]
    runs-on: ubuntu-latest
    steps:
      - name: "Post feedback comment"
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ needs.resolve-command.outputs.pr_number }}');
            const body = JSON.parse('${{ toJSON(needs.resolve-command.outputs.feedback) }}');
            if (!prNumber || !body) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `⚙️ \`${body}\``,
            });

  apply:
    name: "Apply Requested Changes"
    if: needs.resolve-command.outputs.should_apply == 'true'
    needs: [resolve-command]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: "Checkout PR branch"
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-command.outputs.head_ref }}
          fetch-depth: 0

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Install OpenCode CLI"
        run: npm install -g opencode-ai

      - name: "Install repository dependencies"
        run: npm ci --ignore-scripts

      - name: "Collect target comments"
        id: collect
        uses: actions/github-script@v7
        env:
          TARGET_IDS_JSON: ${{ needs.resolve-command.outputs.target_ids_json }}
        with:
          script: |
            const fs = require('fs');
            const ids = JSON.parse(process.env.TARGET_IDS_JSON || '[]');
            const comments = [];
            for (const id of ids) {
              const res = await github.rest.pulls.getReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: id,
              });
              comments.push({
                id: res.data.id,
                path: res.data.path,
                line: res.data.line,
                body: res.data.body,
              });
            }
            const promptPath = 'artifacts/code_apply_targets.json';
            fs.mkdirSync('artifacts', { recursive: true });
            fs.writeFileSync(promptPath, JSON.stringify(comments, null, 2));
            core.setOutput('count', String(comments.length));
            core.setOutput('path', promptPath);

      - name: "Run OpenCode apply"
        id: opencode
        continue-on-error: true
        timeout-minutes: 15
        run: |
          cat > /tmp/code_apply_prompt.txt <<'PROMPT'
          You are modifying this checked-out repository in-place.
          Apply code changes that address the requested PR review comments from artifacts/code_apply_targets.json.
          Requirements:
          - Only change files needed to implement the requested fixes.
          - Preserve existing behavior unless the comment requests behavioral change.
          - Keep changes minimal and coherent.
          - After edits, run `npm run build` and fix any build errors caused by your changes.
          - Do not change git history and do not add generated summaries to source files.
          Return a concise summary of what you changed.
          PROMPT
          timeout 900 opencode run - --format json < /tmp/code_apply_prompt.txt

      - name: "Filter restricted workflow edits"
        id: restricted
        if: steps.opencode.outcome == 'success'
        run: |
          mapfile -t restricted_files < <(git diff --name-only -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#restricted_files[@]}" -eq 0 ]; then
            echo "has_restricted=false" >> "$GITHUB_OUTPUT"
            echo "restricted_files_json=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${restricted_files[@]}" > /tmp/restricted_workflow_files.txt
          while IFS= read -r file; do
            git checkout -- "$file"
          done < /tmp/restricted_workflow_files.txt

          restricted_json="$(python3 - <<'PY'
          import json
          with open('/tmp/restricted_workflow_files.txt', 'r', encoding='utf-8') as fh:
              files=[line.strip() for line in fh if line.strip()]
          print(json.dumps(files))
          PY
          )"

          echo "has_restricted=true" >> "$GITHUB_OUTPUT"
          {
            echo "restricted_files_json<<EOF"
            echo "$restricted_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### /code_apply: Restricted Edits Skipped"
            echo ""
            echo "The following workflow files were edited by OpenCode and were reverted to avoid push rejection:"
            echo ""
            while IFS= read -r file; do
              echo "- \`$file\`"
            done < /tmp/restricted_workflow_files.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Commit and push if changed"
        id: commit
        if: steps.opencode.outcome == 'success'
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: apply /code_apply requested review fixes"
          git push origin "${{ needs.resolve-command.outputs.head_ref }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: "Post result comment"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const opencodeOutcome = '${{ steps.opencode.outcome }}';
            const changed = '${{ steps.commit.outputs.changed }}' === 'true';
            const count = '${{ steps.collect.outputs.count }}';
            const policyProfile = '${{ needs.resolve-command.outputs.policy_profile }}' || 'unknown';
            const hasRestricted = String('${{ steps.restricted.outputs.has_restricted }}').trim().toLowerCase() === 'true';
            const restrictedFilesOutput = ${{ toJSON(steps.restricted.outputs.restricted_files_json) }};
            let restrictedFiles = [];
            if (typeof restrictedFilesOutput === 'string' && restrictedFilesOutput.trim().length > 0) {
              try {
                const parsed = JSON.parse(restrictedFilesOutput);
                if (Array.isArray(parsed)) {
                  restrictedFiles = parsed;
                }
              } catch (error) {
                core.warning(`Unable to parse restricted_files_json output: ${error.message}`);
              }
            }
            const prNumber = Number('${{ needs.resolve-command.outputs.pr_number }}');
            let body = '';
            if (opencodeOutcome !== 'success') {
              body = `❌ \`/code_apply\` failed while running OpenCode for ${count} comment(s). Check workflow logs.`;
            } else if (changed) {
              body = `✅ Applied fixes for ${count} comment(s) via \`/code_apply\` and pushed an update to this PR branch.`;
            } else {
              body = `ℹ️ \`/code_apply\` ran for ${count} comment(s), but no file changes were produced.`;
            }
            if (hasRestricted && restrictedFiles.length > 0) {
              body += `\n\n⚠️ Workflow file edits were detected and intentionally skipped to avoid GitHub permission rejection:\n${restrictedFiles.map(f => `- \`${f}\``).join('\n')}`;
            }
            body += `\n\nPolicy profile: \`${policyProfile}\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
