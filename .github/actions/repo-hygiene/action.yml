name: "Repo Hygiene Review"
description: "Run the provider-owned repo hygiene analyzer against a checked-out repository"

inputs:
  base_sha:
    description: "Base commit SHA for the hygiene comparison"
    required: true
  head_sha:
    description: "Head commit SHA for the hygiene comparison"
    required: true
  policy_path:
    description: "Path to the repo hygiene policy file"
    required: false
    default: ".github/repo-hygiene-policy.json"
  prompt_registry_path:
    description: "Path to the prompt registry used by the hygiene reviewer"
    required: false
    default: "prompts/registry.json"

runs:
  using: "composite"
  steps:
    - name: "Build hygiene runner"
      shell: bash
      run: |
        set -euo pipefail
        repo_root="${{ github.action_path }}/../../.."
        cd "${repo_root}"
        npm ci --ignore-scripts
        npm run build:hygiene

    - name: "Run repo hygiene analyzer"
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base_sha }}
        HEAD_SHA: ${{ inputs.head_sha }}
        REPO_HYGIENE_POLICY_PATH: ${{ inputs.policy_path }}
        PROMPT_REGISTRY_PATH: ${{ inputs.prompt_registry_path }}
      run: |
        set -euo pipefail
        caller_root="${GITHUB_WORKSPACE}"
        provider_root="${{ github.action_path }}/../../.."
        cd "${caller_root}"
        node "${provider_root}/dist/hygiene/index.js"
